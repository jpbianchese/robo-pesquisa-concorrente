<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de concorrente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <div class="card-header">
            <div>
                <h1>Pesquisa de concorrente</h1>
                <p></p>
               <p class="card-intro">Executa a pesquisa de preços concorrentes para nos ajudar com o alinhamento de mercado</p>
            </div>
        </div>

        <div class="control-card">
            <section class="section-panel">
                <h2>Selecionar concorrentes</h2>
                <div class="toggle-grid">
                    <label class="toggle-card">
                        <input type="checkbox" id="checkRaia" checked>
                        <span class="toggle-switch"></span>
                        <span class="toggle-label">Raia</span>
                    </label>
                    <label class="toggle-card">
                        <input type="checkbox" id="checkPacheco" checked>
                        <span class="toggle-switch"></span>
                        <span class="toggle-label">Pacheco</span>
                    </label>
                    <label class="toggle-card">
                        <input type="checkbox" id="checkSuperNosso" checked>
                        <span class="toggle-switch"></span>
                        <span class="toggle-label">Super Nosso</span>
                    </label>
                </div>
            </section>

            <section class="section-panel">
                <h2>Arquivo para processar</h2>
                <input type="text" id="finalName" class="final-name-input" placeholder="Nome do arquivo final (opcional)">
                <label class="file-drop" for="fileInput">
                    <span class="file-drop-text">Clique ou arraste o arquivo aqui</span>
                    <span id="fileName" class="file-name">Nenhum arquivo selecionado</span>
                </label>
                <input type="file" id="fileInput">
            </section>

            <button class="btn action-btn" id="btnIniciar">PROCESSAR PLANILHA</button>
            <div id="status" class="status-bar hidden">O robô está trabalhando... Não feche esta janela.</div>
            <a id="btnDownload" class="btn download-btn hidden" href="http://127.0.0.1:5000/download">BAIXAR RESULTADO FINAL</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
